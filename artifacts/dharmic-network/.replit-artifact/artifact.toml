kind = "web"
previewPath = "/"
title = "Dharmic Network"
version = "1.0.0"
id = "artifacts/dharmic-network"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20734

[services.development]
run = "pnpm --filter @workspace/dharmic-network run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/dharmic-network", "run", "build" ]
publicDir = "artifacts/dharmic-network/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20734"
BASE_PATH = "/"
